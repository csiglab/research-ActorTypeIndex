<!DOCTYPE html>
<html lang="en" data-theme="intelligence-dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meridian Research Group — Structural Analysis Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<style>
    :root {
        --bg-void: #0a0b0d;
        --bg-primary: #121317;
        --bg-secondary: #1a1b20;
        --bg-tertiary: #22242a;
        --bg-elevated: #2a2d35;
        --bg-hover: #32363f;
        --text-primary: #e8eaed;
        --text-secondary: #9aa0a6;
        --text-tertiary: #5f6368;
        --accent-primary: #4f9eff;
        --accent-success: #34d399;
        --accent-warning: #fbbf24;
        --accent-danger: #f87171;
        --accent-info: #818cf8;
        --data-cyan: #22d3ee;
        --data-violet: #a78bfa;
        --data-amber: #fcd34d;
        --font-display: 'Inter', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
        font-family: var(--font-display);
        background: var(--bg-void);
        color: var(--text-primary);
        margin: 0;
        overflow: hidden;
    }

    .platform-shell {
        display: grid;
        grid-template-rows: 56px 1fr 72px;
        height: 100vh;
    }

    .intel-canvas {
        display: grid;
        grid-template-columns: 264px 1fr;
        height: 100%;
    }

    .intel-header, .nav-rail, .workspace-header, .temporal-bar {
        background: var(--bg-primary);
        border-color: rgba(255,255,255,0.06);
    }

    .intel-header, .workspace-header {
        display: flex;
        align-items: center;
        padding: 0 20px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        gap: 24px;
    }

    .nav-rail {
        border-right: 1px solid rgba(255,255,255,0.06);
        overflow-y: auto;
        padding: 16px 12px;
    }

    .workspace {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg-void);
    }

    .workspace-content {
        flex: 1;
        overflow-y: auto;
        padding: 28px;
    }

    .temporal-bar {
        display: flex;
        align-items: center;
        padding: 0 24px;
        border-top: 1px solid rgba(255,255,255,0.06);
    }

    .nav-tree { display: flex; flex-direction: column; gap: 4px; }
    .tree-domain { margin-bottom: 4px; }

    .domain-header {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 10px 12px;
        background: transparent;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: var(--text-primary);
        text-align: left;
    }
    .domain-header:hover { background: rgba(255,255,255,0.04); }

    .domain-icon {
        width: 16px; height: 16px;
        color: var(--accent-primary);
        margin-right: 10px;
        flex-shrink: 0;
    }

    .domain-label {
        flex: 1;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .domain-badge {
        font-size: 10px;
        color: var(--text-tertiary);
        margin-right: 8px;
        font-family: var(--font-mono);
    }

    .expand-icon {
        width: 14px; height: 14px;
        color: var(--text-tertiary);
        transition: transform 0.2s ease;
    }

    .tree-domain.expanded .expand-icon { transform: rotate(90deg); }

    .domain-children {
        margin: 0;
        padding: 0 0 0 24px;
        list-style: none;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
    }

    .tree-domain.expanded .domain-children { max-height: 600px; }

    .nav-item, .nav-leaf, .control-btn, .tl-btn {
        font-weight: 500;
        color: var(--text-secondary);
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s ease;
        background: transparent;
        border: none;
    }

    .nav-item:hover, .nav-leaf:hover {
        background: rgba(255,255,255,0.04);
        color: var(--text-primary);
    }

    .nav-item.active, .nav-leaf.active {
        color: var(--accent-primary);
        background: rgba(79,158,255,0.1);
    }

    .nav-item { padding: 8px 16px; font-size: 13px; }

    .nav-leaf {
        display: flex;
        align-items: center;
        height: 34px;
        padding: 0 12px;
        margin: 2px 0;
        font-size: 13px;
    }

    .nav-leaf.active {
        border-left: 2px solid var(--accent-primary);
        margin-left: -2px;
    }

    .header-brand, .header-context, .header-nav, .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .header-context { gap: 24px; margin-left: 32px; }
    .header-nav { gap: 4px; margin-left: auto; }

    .platform-mark {
        width: 32px; height: 32px;
        background: linear-gradient(135deg, var(--accent-primary), var(--data-violet));
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .platform-title .title-main { font-size: 14px; font-weight: 600; display: block; }
    .platform-title .title-sub { font-size: 11px; color: var(--text-tertiary); display: block; }

    .firm-selector {
        background: var(--bg-secondary);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
    }
    .firm-selector:hover { background: var(--bg-tertiary); }
    .firm-selector .firm-name { font-size: 13px; font-weight: 500; margin-right: 8px; }
    .firm-selector .firm-id { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); }

    .action-btn {
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 8px;
        color: var(--text-secondary);
        cursor: pointer;
    }
    .action-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }

    .breadcrumb { display: flex; align-items: center; gap: 8px; }
    .breadcrumb .crumb { font-size: 13px; color: var(--text-tertiary); }
    .breadcrumb .crumb.active { color: var(--text-primary); font-weight: 500; }
    .breadcrumb .separator { opacity: 0.5; }

    .workspace-controls { display: flex; gap: 8px; }

    .control-btn {
        padding: 6px 12px;
        font-size: 12px;
        background: var(--bg-secondary);
        border: 1px solid rgba(255,255,255,0.06);
    }
    .control-btn:hover { background: var(--bg-tertiary); }

    .timeline-container { display: flex; align-items: center; gap: 24px; width: 100%; }
    .timeline-controls { display: flex; gap: 8px; }

    .tl-btn {
        width: 32px; height: 32px;
        display: flex; align-items: center; justify-content: center;
        background: var(--bg-secondary);
        border: 1px solid rgba(255,255,255,0.06);
        font-size: 12px;
    }
    .tl-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .tl-btn.play {
        width: 40px;
        background: var(--accent-primary);
        border-color: var(--accent-primary);
        color: var(--bg-void);
    }

    .timeline-track-main { flex: 1; position: relative; height: 40px; }

    .track-viewport {
        position: absolute;
        top: 50%; left: 0; right: 0;
        transform: translateY(-50%);
        height: 8px;
        background: var(--bg-secondary);
        border-radius: 4px;
        cursor: pointer;
    }

    .track-progress {
        position: absolute;
        top: 0; left: 0;
        height: 100%; width: 65%;
        background: linear-gradient(90deg, var(--accent-primary), var(--data-violet));
        border-radius: 4px;
    }

    .track-handle {
        position: absolute;
        top: 50%; left: 65%;
        transform: translate(-50%, -50%);
        width: 16px; height: 16px;
        background: var(--text-primary);
        border-radius: 50%;
        cursor: grab;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .current-year { font-size: 20px; font-weight: 700; font-family: var(--font-mono); }

    /* --- Component Styles --- */
    .card-base {
        background: var(--bg-secondary);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        padding: 20px;
        transition: all 0.2s ease;
    }

    .card-base:hover {
        border-color: rgba(79,158,255,0.3);
        box-shadow: 0 0 20px rgba(79,158,255,0.08);
    }

    .card-base-static {
        background: var(--bg-secondary);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px;
        padding: 20px;
    }

    .section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 16px;
    }

    .module-section { margin-bottom: 32px; }

    .genesis-hero {
        position: relative;
        background: linear-gradient(135deg, rgba(79,158,255,0.08) 0%, rgba(129,140,248,0.04) 50%, rgba(167,139,250,0.06) 100%);
        border: 1px solid rgba(79,158,255,0.15);
        border-radius: 16px;
        padding: 36px;
        margin-bottom: 24px;
        overflow: hidden;
    }

    .genesis-hero::after {
        content: '';
        position: absolute;
        top: -40px; right: -40px;
        width: 200px; height: 200px;
        background: radial-gradient(circle, rgba(79,158,255,0.08), transparent 70%);
        pointer-events: none;
    }

    .genesis-year {
        font-size: 72px;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--accent-primary);
        line-height: 1;
        opacity: 0.9;
    }

    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .stat-card { text-align: center; }
    .stat-value {
        font-size: 28px;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--text-primary);
        margin-bottom: 4px;
    }
    .stat-label { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }

    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

    .config-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
        display: block;
    }

    .config-value { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .config-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

    .pillar-card { position: relative; padding-left: 16px; }
    .pillar-card::before {
        content: '';
        position: absolute;
        left: 0; top: 8px; bottom: 8px;
        width: 3px;
        border-radius: 2px;
    }

    .pillar-bar-track {
        height: 6px;
        background: var(--bg-tertiary);
        border-radius: 3px;
        margin-top: 12px;
        overflow: hidden;
    }

    .pillar-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.8s ease;
    }

    .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

    .person-card {
        display: flex;
        gap: 14px;
        align-items: flex-start;
    }

    .person-avatar {
        width: 48px; height: 48px;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; font-weight: 700;
        flex-shrink: 0;
        font-family: var(--font-mono);
    }

    .person-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
    .person-role { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .person-note { font-size: 11px; color: var(--text-tertiary); }

    .allocation-bar-group { display: flex; flex-direction: column; gap: 14px; }

    .alloc-row { display: flex; align-items: center; gap: 16px; }
    .alloc-label { width: 160px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; text-align: right; }
    .alloc-track { flex: 1; height: 10px; background: var(--bg-tertiary); border-radius: 5px; overflow: hidden; }
    .alloc-fill { height: 100%; border-radius: 5px; transition: width 0.8s ease; }
    .alloc-value { width: 80px; font-size: 13px; font-weight: 600; font-family: var(--font-mono); color: var(--text-primary); text-align: right; }

    .service-card { display: flex; gap: 16px; align-items: flex-start; }
    .service-icon {
        width: 44px; height: 44px;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        font-size: 18px;
    }
    .service-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .service-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 8px; }
    .service-stat { font-size: 12px; font-family: var(--font-mono); color: var(--accent-primary); }

    .infra-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

    .infra-card {}
    .infra-type {
        display: inline-block;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 3px 8px;
        border-radius: 4px;
        margin-bottom: 10px;
    }
    .infra-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .infra-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
    .infra-stats { display: flex; gap: 16px; flex-wrap: wrap; }
    .infra-stat-label { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 2px; }
    .infra-stat-value { font-size: 14px; font-weight: 600; font-family: var(--font-mono); }

    .subsidiary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

    .sub-card {}
    .sub-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .sub-name { font-size: 15px; font-weight: 600; }
    .sub-id { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); margin-top: 2px; }
    .sub-domain {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 4px;
        font-weight: 500;
        white-space: nowrap;
    }
    .sub-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 14px; }
    .sub-stats { display: flex; gap: 20px; }
    .sub-stat-label { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 2px; }
    .sub-stat-value { font-size: 13px; font-weight: 600; font-family: var(--font-mono); }

    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 500;
        padding: 3px 8px;
        border-radius: 4px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; }

    .domain-viz { display: flex; flex-direction: column; gap: 12px; }
    .domain-row { display: flex; align-items: center; gap: 16px; }
    .domain-name { width: 180px; font-size: 13px; color: var(--text-secondary); flex-shrink: 0; }
    .domain-track { flex: 1; height: 24px; background: var(--bg-tertiary); border-radius: 6px; overflow: hidden; position: relative; }
    .domain-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 10px; font-size: 11px; font-weight: 600; transition: width 0.8s ease; }
    .domain-count { width: 40px; font-size: 13px; font-weight: 600; font-family: var(--font-mono); text-align: right; }

    .lifecycle-pipeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .lifecycle-stage {
        border-radius: 12px;
        padding: 20px;
        border: 1px solid rgba(255,255,255,0.06);
    }
    .stage-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .stage-count { font-size: 28px; font-weight: 700; font-family: var(--font-mono); margin-bottom: 14px; }
    .stage-entity { font-size: 12px; color: var(--text-secondary); padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .stage-entity:last-child { border-bottom: none; }

    .autonomy-table { width: 100%; border-collapse: collapse; }
    .autonomy-table th {
        font-size: 11px; font-weight: 600; color: var(--text-tertiary);
        text-transform: uppercase; letter-spacing: 0.06em;
        text-align: left; padding: 10px 16px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .autonomy-table td {
        padding: 14px 16px; font-size: 13px;
        border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .autonomy-table tr:hover td { background: rgba(255,255,255,0.02); }

    .level-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
    }

    .level-high { background: rgba(52,211,153,0.15); color: var(--accent-success); }
    .level-medium { background: rgba(251,191,36,0.15); color: var(--accent-warning); }
    .level-low { background: rgba(248,113,113,0.15); color: var(--accent-danger); }

    .mechanism-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .mech-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .mech-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
    .mech-stat-row { display: flex; gap: 20px; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .kpi-card { text-align: center; padding: 24px; }
    .kpi-value { font-size: 32px; font-weight: 700; font-family: var(--font-mono); margin-bottom: 6px; }
    .kpi-label { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .kpi-trend { font-size: 12px; font-weight: 500; }

    .ip-stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .ip-stat-card { text-align: center; padding: 24px 16px; }
    .ip-stat-value { font-size: 36px; font-weight: 700; font-family: var(--font-mono); margin-bottom: 6px; }
    .ip-stat-label { font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }

    .ecosystem-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .impact-number { font-size: 48px; font-weight: 700; font-family: var(--font-mono); color: var(--accent-primary); line-height: 1; }
    .impact-label { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }

    .quote-block {
        background: var(--bg-secondary);
        border-left: 3px solid var(--data-amber);
        border-radius: 0 12px 12px 0;
        padding: 24px;
        margin-bottom: 20px;
    }
    .quote-text { font-size: 16px; font-style: italic; color: var(--text-secondary); line-height: 1.7; margin-bottom: 12px; }
    .quote-attribution { font-size: 12px; color: var(--text-tertiary); }

    .char-list { list-style: none; padding: 0; margin: 0; }
    .char-list li {
        padding: 8px 0;
        font-size: 13px;
        color: var(--text-secondary);
        display: flex;
        align-items: flex-start;
        gap: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .char-list li:last-child { border-bottom: none; }
    .char-bullet { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
        font-size: 11px; font-weight: 500;
        padding: 4px 10px; border-radius: 4px;
        background: var(--bg-tertiary);
        color: var(--text-secondary);
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--bg-hover); }

    @media (max-width: 1200px) {
        .stat-grid { grid-template-columns: repeat(2, 1fr); }
        .lifecycle-pipeline { grid-template-columns: repeat(2, 1fr); }
        .ip-stats-row { grid-template-columns: 1fr; }
        .ecosystem-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
        .intel-canvas { grid-template-columns: 1fr; }
        .nav-rail { display: none; }
        .info-grid { grid-template-columns: 1fr; }
        .stat-grid { grid-template-columns: 1fr; }
        .lifecycle-pipeline { grid-template-columns: 1fr; }
        .header-context { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            animation-duration: 0.01ms !important;
            transition-duration: 0.01ms !important;
        }
    }
</style>

<body class="platform-shell">

    <header class="intel-header">
        <div class="header-brand">
            <div class="platform-mark">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
                    <line x1="12" y1="22" x2="12" y2="15.5"/>
                    <polyline points="22 8.5 12 15.5 2 8.5"/>
                </svg>
            </div>
            <div class="platform-title">
                <span class="title-main" id="headerTitle">Meridian Research Group</span>
                <span class="title-sub">Holding Structure Analysis</span>
            </div>

        const ai = ORG_DATA.impact.aggregateImpact;
        return `<div class="module-section">
            ${R.sectionTitle("Aggregate Impact")}
            <div class="stat-grid" style="margin-bottom:24px">
                <div class="card-base anim-card" style="text-align:center"><div class="impact-number">${ai.publications.toLocaleString()}</div><div class="impact-label">Total Publications</div></div>
                <div class="card-base anim-card" style="text-align:center"><div class="impact-number" style="color:var(--data-violet)">${ai.citations.toLocaleString()}</div><div class="impact-label">Total Citations</div></div>
                <div class="card-base anim-card" style="text-align:center"><div class="impact-number" style="color:var(--accent-success)">${ai.hIndexAggregate}</div><div class="impact-label">Aggregate h-Index</div></div>
                <div class="card-base anim-card" style="text-align:center"><div class="impact-number" style="color:var(--data-amber)">${ai.recognition.reduce((a,r)=>a+r.count,0)}</div><div class="impact-label">Major Recognitions</div></div>
            </div>
            ${R.sectionTitle("Policy Influence")}
            <div class="card-base-static" style="margin-bottom:24px">
                <ul class="char-list">
                    ${ai.policyInfluence.map(p => `<li><span class="char-bullet" style="background:var(--data-amber)"></span>${p}</li>`).join("")}
                </ul>
            </div>
            ${R.sectionTitle("Recognition")}
            <div class="info-grid">
                ${ai.recognition.map(r => `<div class="card-base anim-card">
                    <span class="config-label">${r.name}</span>
                    <div class="config-value" style="font-size:32px">${r.count}</div>
                </div>`).join("")}
            </div>
        </div>`;
    }
};


// ============================================================
//  APPLICATION LOGIC — Navigation, rendering, timeline.
// ============================================================

let currentView = "mandate-overview";

function init() {
    renderHeaderNav();
    renderSidebar();
    navigateTo("mandate-overview", "Overview");
    initTimeline();
}

function renderHeaderNav() {
    const nav = document.getElementById("headerNav");
    const topDomains = ORG_DATA.navigation;
    nav.innerHTML = topDomains.map((d, i) =>
        `<button class="nav-item ${i === 0 ? 'active' : ''}" data-domain="${d.id}">${d.label.split("&")[0].trim().split(" ")[0]}</button>`
    ).join("");

    nav.querySelectorAll(".nav-item").forEach(btn => {
        btn.addEventListener("click", function() {
            nav.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
            this.classList.add("active");
            const domainId = this.dataset.domain;
            const domain = ORG_DATA.navigation.find(d => d.id === domainId);
            if (domain) {
                navigateTo(domain.children[0].id, domain.children[0].label);
                // Expand the matching sidebar domain
                document.querySelectorAll(".tree-domain").forEach(el => {
                    el.classList.toggle("expanded", el.dataset.domain === domainId);
                });
            }
        });
    });
}

function renderSidebar() {
    const tree = document.getElementById("navTree");
    tree.innerHTML = ORG_DATA.navigation.map(domain => `
        <div class="tree-domain ${domain.id === "mandate" ? "expanded" : ""}" data-domain="${domain.id}">
            <button class="domain-header" onclick="toggleDomain('${domain.id}')">
                <span class="domain-icon">${domain.icon}</span>
                <span class="domain-label">${domain.label}</span>
                <span class="domain-badge">${domain.children.length}</span>
                <svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <ul class="domain-children">
                ${domain.children.map(child => `
                    <li class="nav-leaf" data-view="${child.id}" onclick="navigateTo('${child.id}', '${child.label}')">
                        <span>${child.label}</span>
                    </li>
                `).join("")}
            </ul>
        </div>
    `).join("");
}

function toggleDomain(domainId) {
    document.querySelector(`[data-domain="${domainId}"]`).classList.toggle("expanded");
}

function navigateTo(viewId, label) {
    currentView = viewId;

    // Update sidebar active
    document.querySelectorAll(".nav-leaf").forEach(leaf => {
        leaf.classList.toggle("active", leaf.dataset.view === viewId);
    });

    // Update breadcrumb
    document.getElementById("breadcrumbActive").textContent = label;

    // Update header nav active
    const parentDomain = ORG_DATA.navigation.find(d => d.children.some(c => c.id === viewId));
    if (parentDomain) {
        document.querySelectorAll("#headerNav .nav-item").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.domain === parentDomain.id);
        });
    }

    // Render view
    renderView(viewId);
}

function renderView(viewId) {
    const container = document.getElementById("workspaceContent");
    const renderer = Views[viewId];

    if (renderer) {
        container.innerHTML = renderer();
    } else {
        container.innerHTML = `<div style="padding:60px;text-align:center;background:var(--bg-secondary);border-radius:12px;border:1px dashed rgba(255,255,255,0.1)">
            <div style="font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:8px">View Not Implemented</div>
            <div style="font-size:13px;color:var(--text-tertiary)">No renderer found for <code style="background:var(--bg-tertiary);padding:2px 8px;border-radius:4px;font-family:var(--font-mono)">${viewId}</code></div>
        </div>`;
    }

    // Animate cards in
    requestAnimationFrame(() => {
        const cards = container.querySelectorAll(".anim-card");
        cards.forEach((card, i) => {
            card.style.opacity = "0";
            card.style.transform = "translateY(16px)";
            setTimeout(() => {
                card.style.transition = "opacity 0.35s ease, transform 0.35s ease";
                card.style.opacity = "1";
                card.style.transform = "translateY(0)";
            }, i * 50);
        });
    });
}

function initTimeline() {
    const track = document.getElementById("timelineTrack");
    const handle = document.getElementById("timelineHandle");
    const progress = document.getElementById("trackProgress");
    const yearDisplay = document.getElementById("currentYear");
    const startYear = ORG_DATA.organization.founded;
    const endYear = 2024;
    let isDragging = false;

    function updatePos(pct) {
        pct = Math.max(0, Math.min(1, pct));
        progress.style.width = `${pct * 100}%`;
        handle.style.left = `${pct * 100}%`;
        yearDisplay.textContent = Math.round(startYear + pct * (endYear - startYear));
    }

    // Set initial position to end
    updatePos(1);

    handle.addEventListener("mousedown", () => { isDragging = true; });
    document.addEventListener("mouseup", () => { isDragging = false; });

    track.addEventListener("click", e => {
        const rect = track.getBoundingClientRect();
        updatePos((e.clientX - rect.left) / rect.width);
    });

    track.addEventListener("mousemove", e => {
        if (isDragging) {
            const rect = track.getBoundingClientRect();
            updatePos((e.clientX - rect.left) / rect.width);
        }
    });
}

document.addEventListener("DOMContentLoaded", init);
</script>
