    <style>
        :root{--bg-void:#0a0b0d;--bg-primary:#121317;--bg-secondary:#1a1b20;--bg-tertiary:#22242a;--bg-elevated:#2a2d35;--bg-hover:#32363f;--text-primary:#e8eaed;--text-secondary:#9aa0a6;--text-tertiary:#5f6368;--accent-primary:#4f9eff;--accent-success:#34d399;--accent-warning:#fbbf24;--accent-danger:#f87171;--accent-info:#818cf8;--data-cyan:#22d3ee;--data-violet:#a78bfa;--data-amber:#fcd34d;--data-rose:#fb7185;--fg:#179c7d;--fb:#005b7f;--font-display:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace}
        *,*::before,*::after{box-sizing:border-box}
        body{font-family:var(--font-display);background:var(--bg-void);color:var(--text-primary);margin:0;overflow:hidden}
        .shell{display:grid;grid-template-rows:56px 1fr;height:100vh}

        .hnav{gap:4px;margin-left:auto}
        .mark{width:32px;height:32px;background:linear-gradient(135deg,var(--fg),var(--fb));border-radius:8px;display:flex;align-items:center;justify-content:center}
        .ptitle .tm{font-size:14px;font-weight:600;display:block}
        .ptitle .ts{font-size:11px;color:var(--text-tertiary);display:block}
        .fsel{background:var(--bg-secondary);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px 12px;cursor:pointer;transition:background .15s}

        .fsel .fn{font-size:13px;font-weight:500;margin-right:8px}
        .fsel .fi{font-size:11px;font-family:var(--font-mono);color:var(--text-tertiary)}

        .ni:hover{background:rgba(255,255,255,.04);color:var(--text-primary)}
        .ni.on{color:var(--fg);background:rgba(23,156,125,.12)}
        .ab{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:0 0;border:1px solid rgba(255,255,255,.06);border-radius:8px;color:var(--text-secondary);cursor:pointer;transition:all .15s}

        .dh:hover{background:rgba(255,255,255,.04)}
        .di{width:16px;height:16px;color:var(--fg);margin-right:10px;flex-shrink:0}
        .dl{flex:1;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
        .db{font-size:10px;color:var(--text-tertiary);margin-right:8px;font-family:var(--font-mono)}

        .nl:hover{background:rgba(255,255,255,.04);color:var(--text-primary)}
        .nl.on{color:var(--fg);background:rgba(23,156,125,.12);border-left:2px solid var(--fg);margin-left:-2px}
        .bc{display:flex;align-items:center;gap:8px}
        .bc .cr{font-size:13px;color:var(--text-tertiary)}

        .wsc{display:flex;gap:8px}
        .cb{padding:6px 12px;font-size:12px;font-weight:500;background:var(--bg-secondary);border:1px solid rgba(255,255,255,.06);border-radius:6px;cursor:pointer;color:var(--text-secondary);transition:all .15s;font-family:var(--font-display)}
        .cb:hover{background:var(--bg-tertiary);color:var(--text-primary)}
        .c{background:var(--bg-secondary);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;transition:all .2s}
        .c:hover{border-color:rgba(23,156,125,.3);box-shadow:0 0 24px rgba(23,156,125,.06)}

        .st{font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}
        .ms{margin-bottom:36px}.ms:last-child{margin-bottom:0}
        .hb{position:relative;background:linear-gradient(135deg,rgba(23,156,125,.1) 0%,rgba(0,91,127,.06) 50%,rgba(23,156,125,.04) 100%);border:1px solid rgba(23,156,125,.2);border-radius:16px;padding:36px;margin-bottom:24px;overflow:hidden}
        .hb::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(23,156,125,.12) 0%,transparent 70%);pointer-events:none}
        .hy{font-size:80px;font-weight:800;font-family:var(--font-mono);color:var(--fg);line-height:1;opacity:.9}
        .hs{font-size:18px;color:var(--text-secondary);font-weight:500;margin-top:8px}
        .mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
        .mc{background:var(--bg-secondary);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;transition:all .2s}
        .mc:hover{border-color:rgba(23,156,125,.3)}
        .ml{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
        .mv{font-size:28px;font-weight:700;font-family:var(--font-mono);color:var(--text-primary)}
        .mch{font-size:12px;font-weight:500;margin-top:4px}

        .mch.ne{color:var(--text-tertiary)}
        .g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
        .ga{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
        .cl{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:block}
        .cv{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:6px}
        .cd{font-size:13px;color:var(--text-secondary);line-height:1.6}
        .gl{display:flex;flex-direction:column;gap:12px}
        .gi{display:flex;align-items:flex-start;gap:14px;padding:14px;background:var(--bg-tertiary);border-radius:8px}
        .gic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .gic.gr{background:rgba(23,156,125,.15);color:var(--fg)}
        .gic.bl{background:rgba(79,158,255,.15);color:var(--accent-primary)}
        .gic.vi{background:rgba(167,139,250,.15);color:var(--data-violet)}
        .gic.cy{background:rgba(34,211,238,.15);color:var(--data-cyan)}
        .gic.am{background:rgba(252,211,77,.15);color:var(--data-amber)}
        .gic.ro{background:rgba(251,113,133,.15);color:var(--data-rose)}
        .git{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:2px}
        .gid{font-size:12px;color:var(--text-secondary);line-height:1.5}
        .sc{position:relative;overflow:hidden}
        .sc .tb{position:absolute;top:16px;right:16px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
        .tb.ins{background:rgba(23,156,125,.15);color:var(--fg)}
        .tb.int{background:rgba(79,158,255,.15);color:var(--accent-primary)}
        .tb.all{background:rgba(167,139,250,.15);color:var(--data-violet)}
        .tb.jnt{background:rgba(252,211,77,.15);color:var(--data-amber)}
        .sn{font-size:16px;font-weight:700;margin-bottom:4px;padding-right:100px}
        .sd{font-size:12px;color:var(--fg);font-weight:500;margin-bottom:10px}
        .sds{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:14px}
        .ss{display:flex;gap:20px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06)}
        .ssl{font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
        .ssv{font-size:14px;font-weight:600;font-family:var(--font-mono)}
        .lb{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
        .lb.ma{background:rgba(23,156,125,.12);color:var(--fg)}
        .lb.gr{background:rgba(79,158,255,.12);color:var(--accent-primary)}
        .lb.ne{background:rgba(252,211,77,.12);color:var(--data-amber)}
        .ld{width:6px;height:6px;border-radius:50%}
        .ld.ma{background:var(--fg)}.ld.gr{background:var(--accent-primary)}.ld.ne{background:var(--data-amber)}
        .ab2{display:flex;height:32px;border-radius:8px;overflow:hidden;margin-bottom:12px}
        .abs{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;letter-spacing:.04em}
        .al{display:flex;gap:16px;flex-wrap:wrap}
        .ali{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-secondary)}
        .ald{width:8px;height:8px;border-radius:2px}
        .kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
        .ki{padding:16px;background:var(--bg-tertiary);border-radius:8px;display:flex;align-items:center;gap:14px}
        .kb{width:4px;height:40px;border-radius:2px;flex-shrink:0}
        .kn{font-size:12px;color:var(--text-secondary);margin-bottom:2px}
        .kv{font-size:15px;font-weight:700;font-family:var(--font-mono)}
        .qb{background:var(--bg-secondary);border-left:3px solid var(--data-amber);border-radius:0 12px 12px 0;padding:24px}
        .qt{font-size:16px;font-style:italic;color:var(--text-secondary);line-height:1.7;margin-bottom:14px}
        .qa{font-size:13px;font-weight:600;color:var(--text-primary)}
        .cc{background:var(--bg-secondary);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;position:relative}
        .ct{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:4px}
        .cst{font-size:12px;color:var(--text-tertiary);margin-bottom:16px}
        .cw{position:relative;height:260px}
        .pr{display:flex;flex-wrap:wrap;gap:8px}
        .p{padding:6px 14px;background:var(--bg-tertiary);border-radius:6px;font-size:12px;color:var(--text-secondary);font-weight:500;transition:all .15s}
        .p:hover{background:var(--bg-hover);color:var(--text-primary)}
        .p.gn{background:rgba(23,156,125,.12);color:var(--fg)}
        .p.ac{background:rgba(79,158,255,.12);color:var(--accent-primary)}
        .p.vi{background:rgba(167,139,250,.12);color:var(--data-violet)}
        .p.cy{background:rgba(34,211,238,.12);color:var(--data-cyan)}
        .p.am{background:rgba(252,211,77,.12);color:var(--data-amber)}
        .tl{position:relative;padding-left:28px}
        .tl::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--fg),var(--fb),var(--data-cyan))}
        .ti{position:relative;margin-bottom:20px}
        .ti::before{content:'';position:absolute;left:-26px;top:6px;width:10px;height:10px;background:var(--fg);border:3px solid var(--bg-void);border-radius:50%}
        .ti:nth-child(2)::before{background:var(--fb)}
        .ti:nth-child(3)::before{background:var(--data-cyan)}
        .ti:nth-child(4)::before{background:var(--data-amber)}
        .ti:nth-child(5)::before{background:var(--accent-success)}
        .ti:nth-child(6)::before{background:var(--data-violet)}
        .ti:nth-child(7)::before{background:var(--data-rose)}
        .ti:nth-child(8)::before{background:var(--accent-primary)}
        .tly{font-size:13px;font-weight:700;font-family:var(--font-mono);color:var(--fg);margin-bottom:2px}
        .tlt{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:2px}
        .tld{font-size:12px;color:var(--text-secondary);line-height:1.5}
        .bg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
        .bm{display:flex;align-items:center;gap:14px;padding:14px;background:var(--bg-tertiary);border-radius:8px}
        .ba{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
        .bn{font-size:13px;font-weight:600}
        .br{font-size:11px;color:var(--text-tertiary)}
        ::-webkit-scrollbar{width:6px;height:6px}
        ::-webkit-scrollbar-track{background:var(--bg-secondary)}
        ::-webkit-scrollbar-thumb{background:var(--bg-elevated);border-radius:3px}
        ::-webkit-scrollbar-thumb:hover{background:var(--bg-hover)}
        @media(max-width:1024px){.g2{grid-template-columns:1fr}}
        @media(max-width:768px){.canvas{grid-template-columns:1fr}.rail{display:none}.hctx,.hnav{display:none}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>

<script>
/* ===== DATA MODEL ===== */
const D={
identity:{name:"Fraunhofer-Gesellschaft zur Förderung der angewandten Forschung e.V.",short:"Fraunhofer",id:"FHG-1949",founded:1949,hq:"Munich, Bavaria, Germany",tagline:"Applied research that drives economic development and shapes the technological future of Germany and Europe",legal:"Registered Association (e.V.) — non-profit under German civil law",namedAfter:"Joseph von Fraunhofer (1787–1826), physicist and optical pioneer"},
mandate:{thesis:"Bridge the gap between academic fundamental research and industrial application by conducting contract research that solves real-world engineering and technology problems. The Fraunhofer Model — a unique funding structure where institutional base funding is leveraged to attract contract research — ensures institutes remain market-driven while maintaining scientific depth. Every euro of public base funding must attract approximately two euros in contract revenue.",model:{type:"Strategic Research Society",desc:"Not a corporate holding but a registered non-profit association under German law. The Senate (comprising government, industry, and science representatives) governs the society. The President and Executive Board manage day-to-day operations. Institutes operate as semi-autonomous profit centers that compete for contract research while sharing the Fraunhofer brand, infrastructure, and governance framework.",autonomy:"High operational autonomy per institute, coordinated through strategic programs and alliances",controls:["Annual Senate review of each institute","Strategic research field coordination via Alliances","Shared performance metrics (contract ratio, patent output)","Presidential steering through Lighthouse Projects"]},governance:{senate:{size:"~30 members",comp:"Federal Government (BMBF), state (Länder) governments, industry, and the scientific community",role:"Supreme governing body — approves budget, strategic direction, institute establishment and closure",members:[{n:"Prof. Dr.-Ing. Holger Hanselka",r:"President",bg:"Former Director of Fraunhofer IWS, expert in laser technology and energy systems",i:"HH",c:"#179c7d"},{n:"Prof. Dr. Sascha Stowasser",r:"VP Human Resources",bg:"Former Director of Fraunhofer IAO",i:"SS",c:"#4f9eff"},{n:"Alfred Gossner",r:"Executive Board (Finance)",bg:"Finance and administration",i:"AG",c:"#a78bfa"},{n:"BMBF Senate Delegate",r:"Federal Government Rep.",bg:"Federal Ministry of Education and Research",i:"BM" function vDP(){return`<div class="ms"><div class="st">Institute Count Over Time</div><div class="cc"><div class="ct">Number of Institutes</div><div class="cst">Growth of the Fraunhofer institute network</div><div class="cw"><canvas id="ch7"></canvas></div></div></div><div class="ms"><div class="st">Cross-Institute Collaboration Index</div><div class="cc"><div class="ct">Collaboration Index</div><div class="cst">Normalized cross-institute co-authorship and joint grants (0-1)</div><div class="cw"><canvas id="ch8"></canvas></div></div></div><div class="ms"><div class="st">Cumulative Spin-offs</div><div class="cc"><div class="ct">Total Spin-off Companies</div><div class="cst">Cumulative spin-offs created since founding</div><div class="cw"><canvas id="ch9"></canvas></div></div></div>`}

/* ===== VIEW: DYNAMICS TIMELINE ===== */
function vDT(){return`<div class="ms"><div class="st">Key Events</div><div class="tl">${D.dynamics.events.map(e=>`<div class="ti"><div class="tly">${e.y}</div><div class="tlt">${e.t}</div><div class="tld">${e.d}</div></div>`).join("")}</div></div>`}

/* ===== CHART INIT ===== */
function initC(v){
    const yr=D.dynamics.years,m=D.dynamics.m;
    const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#1a1b20",titleColor:"#e8eaed",bodyColor:"#9aa0a6",borderColor:"rgba(23,156,125,.3)",borderWidth:1,cornerRadius:8,padding:12,titleFont:{family:"'Inter'",weight:"600"},bodyFont:{family:"'JetBrains Mono'"}}},scales:{x:{grid:{color:"rgba(255,255,255,.04)",drawBorder:false},ticks:{color:"#5f6368",font:{family:"'JetBrains Mono'",size:11}}},y:{grid:{color:"rgba(255,255,255,.04)",drawBorder:false},ticks:{color:"#5f6368",font:{family:"'JetBrains Mono'",size:11}}}},interaction:{intersect:false,mode:"index"},elements:{point:{radius:3,hoverRadius:6},line:{tension:.3,borderWidth:2.5}}};
    function mk(id,data,label,color,fill){
        const el=document.getElementById(id);if(!el)return;
        charts[id]=new Chart(el,{type:"line",data:{labels:yr,datasets:[{label,data,borderColor:color,backgroundColor:fill?color+"18":"transparent",fill:!!fill,pointBackgroundColor:color}]},options:JSON.parse(JSON.stringify(base))})
    }
    if(v==="dg"){mk("ch1",m.emp,"Employees","#179c7d",1);mk("ch2",m.bud,"Budget (€M)","#a78bfa",1);mk("ch3",m.ind,"Industry (€M)","#22d3ee",1)}
    if(v==="di"){mk("ch4",m.pat,"Patents","#fcd34d",1);mk("ch5",m.lic,"Licensing (€M)","#34d399",1);mk("ch6",m.pubs,"Publications","#179c7d",1)}
    if(v==="dp"){mk("ch7",m.inst,"Institutes","#fb7185",1);mk("ch8",m.collab,"Collab Index","#a78bfa",1);mk("ch9",m.spin,"Spin-offs","#34d399",1)}
}

/* ===== UTILS ===== */
function anim(){document.querySelectorAll(".c,.mc,.gi,.bm,.ki,.cc,.hb,.qb,.sc").forEach((e,i)=>{e.style.opacity="0";e.style.transform="translateY(16px)";setTimeout(()=>{e.style.transition="opacity .35s ease,transform .35s ease";e.style.opacity="1";e.style.transform="translateY(0)"},i*35)})}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.transform="translateY(0)";t.style.opacity="1";setTimeout(()=>{t.style.transform="translateY(80px)";t.style.opacity="0"},2400)}
</script>
