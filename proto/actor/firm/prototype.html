<!DOCTYPE html>
<html lang="en" data-theme="intelligence-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firm Intelligence Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #0a0b0d;
      --bg-primary: #121317;
      --bg-secondary: #1a1b20;
      --bg-tertiary: #22242a;
      --bg-elevated: #2a2d35;
      --bg-hover: #32363f;
      
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-tertiary: #5f6368;
      
      --accent-primary: #4f9eff;
      --accent-success: #34d399;
      --accent-warning: #fbbf24;
      --accent-danger: #f87171;
      --accent-info: #818cf8;
      
      --data-cyan: #22d3ee;
      --data-violet: #a78bfa;
      --data-amber: #fcd34d;
      --data-rose: #fb7185;
      --data-emerald: #34d399;
      --data-slate: #94a3b8;
      
      --font-display: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --font-data: 'DM Sans', sans-serif;
    }
    
    * { box-sizing: border-box; }
    
    body {
      font-family: var(--font-display);
      background: var(--bg-void);
      color: var(--text-primary);
      margin: 0;
      overflow: hidden;
    }
    
    .platform-shell {
      display: grid;
      grid-template-rows: 56px 1fr 72px;
      height: 100vh;
      background: var(--bg-void);
    }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--bg-hover); }
    
    .panel-intelligence {
      background: linear-gradient(145deg, rgba(26, 27, 32, 0.95) 0%, rgba(18, 19, 23, 0.98) 100%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      backdrop-filter: blur(20px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    
    .card-data {
      background: var(--bg-tertiary);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card-data:hover {
      border-color: var(--accent-primary);
      box-shadow: 0 0 20px rgba(79, 158, 255, 0.15);
    }
    
    .metric-value {
      font-family: var(--font-mono);
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #9aa0a6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .intel-header {
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: var(--bg-primary);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      gap: 24px;
    }
    
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .platform-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-primary), var(--data-violet));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .platform-title .title-main {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: block;
    }
    
    .platform-title .title-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      display: block;
    }
    
    .header-context {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-left: 32px;
    }
    
    .firm-selector {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .firm-selector:hover {
      background: var(--bg-tertiary);
      border-color: rgba(255, 255, 255, 0.1);
    }
    
    .firm-selector .firm-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-right: 8px;
    }
    
    .firm-selector .firm-id {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    
    .temporal-context {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .temporal-mode {
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .temporal-range {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .range-divider { color: var(--text-tertiary); margin: 0 4px; }
    
    .header-nav {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    
    .nav-item {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
      background: transparent;
    }
    
    .nav-item:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04);
    }
    
    .nav-item.active {
      color: var(--accent-primary);
      background: rgba(79, 158, 255, 0.1);
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    .action-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .action-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    
    .intel-canvas {
      display: grid;
      grid-template-columns: 260px 1fr;
      background: var(--bg-void);
      overflow: hidden;
    }
    
    .nav-rail {
      background: var(--bg-primary);
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      overflow-y: auto;
      padding: 16px 12px;
    }
    
    .nav-tree {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .tree-domain { margin-bottom: 4px; }
    
    .domain-header {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 10px 12px;
      background: transparent;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease;
      color: var(--text-primary);
      text-align: left;
    }
    
    .domain-header:hover { background: rgba(255, 255, 255, 0.04); }
    
    .domain-icon {
      width: 16px;
      height: 16px;
      color: var(--accent-primary);
      margin-right: 10px;
      flex-shrink: 0;
    }
    
    .domain-label {
      flex: 1;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    
    .domain-badge {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-right: 8px;
      font-family: var(--font-mono);
    }
    
    .expand-icon {
      width: 14px;
      height: 14px;
      color: var(--text-tertiary);
      transition: transform 0.2s ease;
    }
    
    .tree-domain.expanded .expand-icon { transform: rotate(90deg); }
    
    .domain-children {
      margin: 0;
      padding: 0 0 0 24px;
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    
    .tree-domain.expanded .domain-children { max-height: 500px; }
    
    .nav-leaf {
      display: flex;
      align-items: center;
      height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      margin: 2px 0;
    }
    
    .nav-leaf:hover { background: rgba(255, 255, 255, 0.04); }
    
    .nav-leaf.active {
      background: rgba(79, 158, 255, 0.12);
      border-left: 2px solid var(--accent-primary);
      margin-left: -2px;
    }
    
    .leaf-label { font-size: 13px; color: var(--text-secondary); }
    
    .nav-leaf.active .leaf-label {
      color: var(--text-primary);
      font-weight: 500;
    }
    
    .workspace {
      display: flex;
      flex-direction: column;
      background: var(--bg-void);
      overflow: hidden;
    }
    
    .workspace-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: var(--bg-primary);
    }
    
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .breadcrumb .crumb { font-size: 13px; color: var(--text-tertiary); }
    
    .breadcrumb .crumb.active {
      color: var(--text-primary);
      font-weight: 500;
    }
    
    .breadcrumb .separator { color: var(--text-tertiary); opacity: 0.5; }
    
    .workspace-controls {
      display: flex;
      gap: 8px;
    }
    
    .control-btn {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .control-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .workspace-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    .intel-module {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    
    .intel-module.active { display: block; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .module-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    
    .module-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }
    
    .module-subtitle {
      font-size: 13px;
      color: var(--text-tertiary);
      margin-top: 4px;
      display: block;
    }
    
    .module-section { margin-bottom: 32px; }
    
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    
    .identity-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 24px;
    }
    
    .identity-main {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
    }
    
    .firm-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-elevated));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-primary);
    }
    
    .identity-info .firm-name {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    
    .firm-meta {
      display: flex;
      gap: 24px;
    }
    
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .meta-label {
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .meta-value {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .identity-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .tag {
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      border-radius: 4px;
    }
    
    .tag-primary {
      background: rgba(79, 158, 255, 0.15);
      color: var(--accent-primary);
    }
    
    .tag-secondary {
      background: rgba(129, 140, 248, 0.15);
      color: var(--accent-info);
    }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    
    .metric-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 16px;
      transition: all 0.2s ease;
    }
    
    .metric-card:hover {
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }
    
    .metric-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .metric-label { font-size: 12px; color: var(--text-tertiary); }
    
    .metric-trend {
      font-size: 11px;
      font-weight: 500;
      font-family: var(--font-mono);
    }
    
    .metric-trend.positive { color: var(--accent-success); }
    .metric-trend.negative { color: var(--accent-danger); }
    
    .metric-card .metric-value { font-size: 24px; }
    
    .metric-sparkline { height: 32px; margin-top: 12px; }
    
    /* Genesis Specific Styles */
    .genesis-hero {
      position: relative;
      background: linear-gradient(135deg, rgba(79, 158, 255, 0.08) 0%, rgba(129, 140, 248, 0.04) 50%, rgba(167, 139, 250, 0.06) 100%);
      border: 1px solid rgba(79, 158, 255, 0.15);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    
    .genesis-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
    }
    
    .genesis-year-display {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
    }
    
    .genesis-year {
      font-size: 72px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--accent-primary);
      line-height: 1;
      text-shadow: 0 0 40px rgba(79, 158, 255, 0.3);
    }
    
    .genesis-date {
      font-size: 18px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    
    .genesis-location {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-tertiary);
      margin-bottom: 24px;
    }
    
    .genesis-location svg {
      width: 16px;
      height: 16px;
      color: var(--data-rose);
    }
    
    .genesis-context {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
      max-width: 720px;
    }
    
    .founders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    
    .founder-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      gap: 16px;
      transition: all 0.2s ease;
    }
    
    .founder-card:hover {
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }
    
    .founder-avatar {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-elevated));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-primary);
      flex-shrink: 0;
    }
    
    .founder-info {
      flex: 1;
    }
    
    .founder-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    
    .founder-role {
      font-size: 12px;
      color: var(--accent-primary);
      margin-bottom: 8px;
    }
    
    .founder-background {
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.5;
    }
    
    .strategic-intent-card {
      background: var(--bg-secondary);
      border-left: 3px solid var(--data-amber);
      border-radius: 0 12px 12px 0;
      padding: 24px;
    }
    
    .intent-quote {
      font-size: 17px;
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 16px;
    }
    
    .intent-attribution {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .intent-author {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .intent-title {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    
    .market-config-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    .market-config-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 20px;
    }
    
    .config-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      display: block;
    }
    
    .config-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    
    .config-detail {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    
    .config-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    
    .config-tag {
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      background: var(--bg-tertiary);
      border-radius: 4px;
      color: var(--text-secondary);
    }
    
    .tech-system-timeline {
      position: relative;
      padding-left: 32px;
    }
    
    .tech-system-timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--accent-primary), var(--data-violet), var(--data-cyan));
      border-radius: 1px;
    }
    
    .tech-layer {
      position: relative;
      margin-bottom: 20px;
      padding: 20px;
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
    }
    
    .tech-layer::before {
      content: '';
      position: absolute;
      left: -28px;
      top: 24px;
      width: 12px;
      height: 12px;
      background: var(--accent-primary);
      border: 3px solid var(--bg-void);
      border-radius: 50%;
    }
    
    .tech-layer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .tech-layer-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .tech-layer-status {
      font-size: 10px;
      padding: 3px 8px;
      background: rgba(79, 158, 255, 0.15);
      color: var(--accent-primary);
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .tech-specs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    
    .tech-spec {
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
    }
    
    .spec-name {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    
    .spec-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .product-portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    
    .product-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s ease;
    }
    
    .product-card:hover {
      border-color: var(--accent-primary);
      transform: translateY(-2px);
    }
    
    .product-icon {
      width: 40px;
      height: 40px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      color: var(--accent-primary);
    }
    
    .product-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    
    .product-category {
      font-size: 12px;
      color: var(--accent-info);
      margin-bottom: 8px;
    }
    
    .product-desc {
      font-size: 12px;
      color: var(--text-tertiary);

          </div>
        </section>
      `;
    }

    // Tech Evolution Module
    function renderTechEvolutionModule() {

                  <span class="year-marker">2015</span>

                  <span class="year-marker">2024</span>

                    <div class="event-node" style="left: ${event.position}%;">
                      <div class="node-marker"></div>
                      <div class="node-card">
                        <span class="node-year">${event.year}</span>
                        <span class="node-title">${event.title}</span>
                        <span class="node-type">${event.type}</span>

              </div>

          </div>

          <div class="module-section">
            <h3 class="section-title">Detected Structural Changes</h3>
            <div class="alerts-list">
              ${alertsData.map(alert => `
                <div class="alert-card" data-severity="${alert.severity}">
                  <div class="alert-indicator"></div>
                  <div class="alert-content">
                    <span class="alert-type">${alert.type}</span>
                    <span class="alert-title">${alert.title}</span>
                    <span class="alert-date">${alert.date}</span>
                    <p class="alert-description">${alert.description}</p>
                    <div class="alert-impact">
                      <span class="impact-label">Impact:</span>
                      <span class="impact-value ${alert.impactPositive ? 'positive' : ''}">${alert.impact}</span>

    // Industry Module
    function renderIndustryModule() {
      return `
        <section class="intel-module active" data-module="industry-profile">
          <div class="module-section">
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">
              ${[
                { label: 'Global Market Size', value: '$1.2T', change: '+4.2% CAGR' },
                { label: 'Industry Growth', value: '4.2%', note: '5-year CAGR' },
                { label: 'Key Players', value: '847', note: 'Companies >$50M' },

    // Markets Module
    function renderMarketsModule() {
      return `
        <section class="intel-module active" data-module="market-profile">
          <div class="module-section">
            <div style="display: flex; gap: 24px; align-items: center; background: var(--bg-secondary); border-radius: 12px; padding: 24px;">
              <div>
                <span class="metric-label">Total Addressable Market</span>
                <span class="metric-value" style="font-size: 36px; display: block;">$180B</span>

    // Utility Functions
    function getFlagEmoji(code) {
      const flags = { 'DE': 'DE', 'FR': 'FR', 'US': 'US', 'CN': 'CN', 'GB': 'UK', 'EU': 'EU' };
      return `<span style="font-weight: 600; color: var(--text-tertiary); font-size: 12px;">${flags[code] || code}</span>`;
    }

    // Timeline
    function initializeTimeline() {
      const track = document.getElementById('timelineTrack');
      const handle = document.getElementById('timelineHandle');
      let isDragging = false;

      handle.addEventListener('mousedown', () => { isDragging = true; });
      document.addEventListener('mouseup', () => { isDragging = false; });
      
      track.addEventListener('click', (e) => {
        const rect = track.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        updateTimelinePosition(percent);
      });

      track.addEventListener('mousemove', (e) => {
        if (isDragging) {
          const rect = track.getBoundingClientRect();
          const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
          updateTimelinePosition(percent);
        }
      });
    }

    function updateTimelinePosition(percent) {
      const progress = document.querySelector('.track-progress');
      const handle = document.getElementById('timelineHandle');
      const yearDisplay = document.getElementById('currentYear');
      
      const startYear = 1998;
      const endYear = 2024;
      const currentYear = Math.round(startYear + percent * (endYear - startYear));
      
      progress.style.width = `${percent * 100}%`;
      handle.style.left = `${percent * 100}%`;
      yearDisplay.textContent = currentYear;
    }

    // Animations
    function initializeAnimations() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('animate-in');
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.metric-card, .category-card, .dimension-card, .alert-card, .founder-card, .product-card, .market-config-card, .tech-layer').forEach(el => {
        observer.observe(el);
      });

      const cards = document.querySelectorAll('.metric-card, .category-card, .founder-card, .product-card');
      cards.forEach((card, i) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(20px)';
        setTimeout(() => {
          card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
        }, i * 60);
      });
    }

    // Header Navigation
    document.querySelectorAll('.header-nav .nav-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.header-nav .nav-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
