<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actor Profile — Holding Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg-void:#0a0b0d;--bg-primary:#121317;--bg-secondary:#1a1b20;--bg-tertiary:#22242a;--bg-elevated:#2a2d35;--bg-hover:#32363f;--text-primary:#e8eaed;--text-secondary:#9aa0a6;--text-tertiary:#5f6368;--accent-primary:#4f9eff;--accent-success:#34d399;--accent-warning:#fbbf24;--accent-danger:#f87171;--accent-info:#818cf8;--data-cyan:#22d3ee;--data-violet:#a78bfa;--data-amber:#fcd34d;--data-rose:#fb7185;--fg:#179c7d;--fb:#005b7f;--font-display:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace}
        *,*::before,*::after{box-sizing:border-box}
        body{font-family:var(--font-display);background:var(--bg-void);color:var(--text-primary);margin:0;overflow:hidden}
        .shell{display:grid;grid-template-rows:56px 1fr;height:100vh}
        .canvas{display:grid;grid-template-columns:272px 1fr;height:100%}
        .hdr{background:var(--bg-primary);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 20px;gap:24px}
        .rail{background:var(--bg-primary);border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;padding:16px 12px}
        .ws{display:flex;flex-direction:column;overflow:hidden;background:var(--bg-void)}
        .ws-hdr{background:var(--bg-primary);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 24px;height:48px;justify-content:space-between}
        .ws-body{flex:1;overflow-y:auto;padding:28px}
        .hbrand{display:flex;align-items:center;gap:12px}
        .hctx{display:flex;align-items:center;gap:24px;margin-left:32px}
        .hact{display:flex;align-items:center;gap:8px;margin-left:auto}
        .mark{width:32px;height:32px;background:linear-gradient(135deg,var(--fg),var(--fb));border-radius:8px;display:flex;align-items:center;justify-content:center}
        .ptitle .tm{font-size:14px;font-weight:600;display:block}
        .ptitle .ts{font-size:11px;color:var(--text-tertiary);display:block}
        .fsel{background:var(--bg-secondary);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px 12px}
        .fsel .fn{font-size:13px;font-weight:500;margin-right:8px}
        .fsel .fi{font-size:11px;font-family:var(--font-mono);color:var(--text-tertiary)}
        .ab{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:0 0;border:1px solid rgba(255,255,255,.06);border-radius:8px;color:var(--text-secondary);cursor:pointer;transition:all .15s}
        .ab:hover{background:var(--bg-secondary);color:var(--text-primary)}
        .tree{display:flex;flex-direction:column;gap:2px}
        .td{margin-bottom:2px}
        .dh{display:flex;align-items:center;width:100%;padding:10px 12px;background:0 0;border:none;border-radius:8px;cursor:pointer;color:var(--text-primary);text-align:left;font-family:var(--font-display)}
        .dh:hover{background:rgba(255,255,255,.04)}
        .di{width:16px;height:16px;color:var(--fg);margin-right:10px;flex-shrink:0}
        .dl{flex:1;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
        .db{font-size:10px;color:var(--text-tertiary);margin-right:8px;font-family:var(--font-mono)}
        .ei{width:14px;height:14px;color:var(--text-tertiary);transition:transform .2s}
        .td.ex .ei{transform:rotate(90deg)}
        .dc{margin:0;padding:0 0 0 24px;list-style:none;max-height:0;overflow:hidden;transition:max-height .3s}
        .td.ex .dc{max-height:600px}
        .nl{display:flex;align-items:center;height:34px;padding:0 12px;margin:2px 0;font-size:13px;font-weight:500;color:var(--text-secondary);border-radius:6px;cursor:pointer;transition:all .15s;background:0 0;border:none;width:100%;font-family:var(--font-display)}
        .nl:hover{background:rgba(255,255,255,.04);color:var(--text-primary)}
        .nl.on{color:var(--fg);background:rgba(23,156,125,.12);border-left:2px solid var(--fg);margin-left:-2px}
        .bc{display:flex;align-items:center;gap:8px}
        .bc .cr{font-size:13px;color:var(--text-tertiary)}
        .bc .cr.on{color:var(--text-primary);font-weight:500}
        .bc .sp{opacity:.4}
        .wsc{display:flex;gap:8px}
        .cb{padding:6px 12px;font-size:12px;font-weight:500;background:var(--bg-secondary);border:1px solid rgba(255,255,255,.06);border-radius:6px;cursor:pointer;color:var(--text-secondary);transition:all .15s;font-family:var(--font-display)}
        .cb:hover{background:var(--bg-tertiary);color:var(--text-primary)}
        .c{background:var(--bg-secondary);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;transition:all .2s}
        .c:hover{border-color:rgba(23,156,125,.3);box-shadow:0 0 24px rgba(23,156,125,.06)}
        .cs{background:var(--bg-secondary);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px}
        .st{font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}
        .ms{margin-bottom:36px}.ms:last-child{margin-bottom:0}
        .hb{position:relative;background:linear-gradient(135deg,rgba(23,156,125,.1) 0%,rgba(0,91,127,.06) 50%,rgba(23,156,125,.04) 100%);border:1px solid rgba(23,156,125,.2);border-radius:16px;padding:36px;margin-bottom:24px;overflow:hidden}
        .hb::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(23,156,125,.12) 0%,transparent 70%);pointer-events:none}
        .hy{font-size:80px;font-weight:800;font-family:var(--font-mono);color:var(--fg);line-height:1;opacity:.9}
        .hs{font-size:18px;color:var(--text-secondary);font-weight:500;margin-top:8px}
        .mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
        .mc{background:var(--bg-secondary);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;transition:all .2s}
        .mc:hover{border-color:rgba(23,156,125,.3)}
        .ml{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
        .mv{font-size:28px;font-weight:700;font-family:var(--font-mono);color:var(--text-primary)}
        .mch{font-size:12px;font-weight:500;margin-top:4px}
        .mch.up{color:var(--accent-success)}
        .mch.dn{color:var(--accent-danger)}
        .mch.ne{color:var(--text-tertiary)}
        .g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
        .cl{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:block}
        .cv{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:6px}
        .cd{font-size:13px;color:var(--text-secondary);line-height:1.6}
        .qb{background:var(--bg-secondary);border-left:3px solid var(--data-amber);border-radius:0 12px 12px 0;padding:24px}
        .qt{font-size:16px;font-style:italic;color:var(--text-secondary);line-height:1.7;margin-bottom:14px}
        .qa{font-size:13px;font-weight:600;color:var(--text-primary)}
        .pr{display:flex;flex-wrap:wrap;gap:8px}
        .p{padding:6px 14px;background:var(--bg-tertiary);border-radius:6px;font-size:12px;color:var(--text-secondary);font-weight:500;transition:all .15s}
        .p:hover{background:var(--bg-hover);color:var(--text-primary)}
        .p.gn{background:rgba(23,156,125,.12);color:var(--fg)}
        .p.ac{background:rgba(79,158,255,.12);color:var(--accent-primary)}
        .p.vi{background:rgba(167,139,250,.12);color:var(--data-violet)}
        .md-note{background:var(--bg-secondary);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:28px;overflow-y:auto;max-height:calc(100vh - 180px)}
        .md-note h1{font-size:22px;font-weight:700;color:var(--text-primary);margin:0 0 16px 0;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
        .md-note h2{font-size:18px;font-weight:700;color:var(--text-primary);margin:28px 0 12px 0;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.04)}
        .md-note h3{font-size:15px;font-weight:600;color:var(--text-primary);margin:20px 0 8px 0}
        .md-note p{font-size:14px;color:var(--text-secondary);line-height:1.75;margin:0 0 14px 0}
        .md-note ul,.md-note ol{padding-left:20px;margin:0 0 14px 0}
        .md-note li{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:6px}
        .md-note strong{color:var(--text-primary);font-weight:600}
        .md-note em{font-style:italic;color:var(--data-cyan)}
        .md-note code{font-family:var(--font-mono);font-size:12px;background:var(--bg-tertiary);padding:2px 6px;border-radius:4px;color:var(--data-amber)}
        .md-note pre{background:var(--bg-tertiary);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:16px;overflow-x:auto;margin:0 0 14px 0}
        .md-note pre code{background:none;padding:0;color:var(--text-secondary);font-size:12px}
        .md-note blockquote{border-left:3px solid var(--data-amber);padding:12px 20px;margin:0 0 14px 0;background:rgba(252,211,77,.04);border-radius:0 8px 8px 0}
        .md-note blockquote p{color:var(--text-secondary);margin:0}
        .md-note a{color:var(--accent-primary);text-decoration:none;border-bottom:1px solid rgba(79,158,255,.3);transition:border-color .15s}
        .md-note a:hover{border-color:var(--accent-primary)}
        .md-note hr{border:none;border-top:1px solid rgba(255,255,255,.06);margin:20px 0}
        .md-note table{width:100%;border-collapse:collapse;margin:0 0 14px 0}
        .md-note th{text-align:left;font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.08);background:var(--bg-tertiary)}
        .md-note td{font-size:13px;color:var(--text-secondary);padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
        .md-note tr:hover td{background:rgba(255,255,255,.02)}
        ::-webkit-scrollbar{width:6px;height:6px}
        ::-webkit-scrollbar-track{background:var(--bg-secondary)}
        ::-webkit-scrollbar-thumb{background:var(--bg-elevated);border-radius:3px}
        ::-webkit-scrollbar-thumb:hover{background:var(--bg-hover)}
        @media(max-width:1024px){.g2{grid-template-columns:1fr}}
        @media(max-width:768px){.canvas{grid-template-columns:1fr}.rail{display:none}.hctx{display:none}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body class="shell">
    <header class="hdr">
        <div class="hbrand">
            <div class="mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg></div>
            <div class="ptitle"><span class="tm" id="hdr-name">Actor Profile</span><span class="ts">Intelligence Platform</span></div>
        </div>
        <div class="hctx"><div class="fsel"><span class="fn" id="hdr-fsel">Actor Name</span><span class="fi" id="hdr-fid">ACT-0000</span></div></div>
        <div class="hact">
            <button class="ab" aria-label="Export" onclick="toast('Data exported')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
            <button class="ab" aria-label="Fullscreen" onclick="document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
        </div>
    </header>
    <main class="canvas">
        <aside class="rail"><nav class="tree" id="nav"></nav></aside>
        <section class="ws">
            <div class="ws-hdr">
                <div class="bc"><span class="cr" id="bp">Profile</span><span class="sp">/</span><span class="cr on" id="ba">Overview</span></div>
                <div class="wsc"><button class="cb" onclick="toast('Compare mode coming soon')">Compare</button><button class="cb" onclick="toast('Report generated')">Report</button></div>
            </div>
            <div class="ws-body" id="wb"></div>
        </section>
    </main>
    <div id="toast" style="position:fixed;bottom:24px;right:24px;background:var(--bg-elevated);border:1px solid rgba(23,156,125,.3);color:var(--text-primary);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;pointer-events:none"></div>
<script>
/* =====================================================================
   ACTOR DATA MODEL
   ---------------------------------------------------------------------
   The "model" array drives the sidebar. Each entry is a section group
   with "children" as leaf views. The "type" field on each child
   determines how it renders:
     "overview"  — identity hero + thesis + model cards
     "metrics"   — key metric tiles (reads from D.metrics)
     "markdown"  — rendered markdown from the child's "content" field
   ===================================================================== */
const D = {
    identity: {
        name:    "Acme Corporation",
        short:   "Acme",
        id:      "ACT-1946",
        founded: 1946,
        hq:      "Springfield, IL, United States",
        tagline: "A diversified industrial conglomerate operating across advanced manufacturing, digital infrastructure, and strategic materials.",
        legal:   "Delaware C-Corporation — publicly traded (NYSE: ACME)",
        sector:  "Industrial Conglomerate",
        website: "acme.example.com"
    },
    overview: {
        thesis: "Acme operates as a holding company that provides centralized capital allocation, governance frameworks, and shared services across a portfolio of largely autonomous operating subsidiaries. The central thesis is that strategic overlap between subsidiaries — in technology, supply chains, and customer relationships — creates compounding advantages that pure-play competitors cannot replicate.",
        model: {
            type:     "Diversified Holding Company",
            desc:     "Publicly traded parent with majority-owned operating subsidiaries. The Board sets capital allocation and risk parameters; the CEO and corporate staff execute strategy, M&A, and cross-subsidiary coordination.",
            autonomy: "High operating autonomy per subsidiary, coordinated through annual planning cycles, shared services, and cross-divisional councils."
        },
        intent: "To be the most resilient industrial holding company by maintaining a portfolio of businesses that are individually defensible but collectively synergistic — such that disruption to any single market creates opportunities for other portfolio companies."
    },
    metrics: [
        {l:"Annual Revenue",    v:"$14.2B",  c:"+5.1% YoY",  d:"up"},
        {l:"EBITDA",            v:"$2.8B",   c:"+7.3% YoY",  d:"up"},
        {l:"Employees",         v:"42,000",  c:"+3.2% YoY",  d:"up"},
        {l:"Subsidiaries",      v:"18",      c:"+2 YoY",     d:"up"},
        {l:"Operating Margins", v:"19.7%",   c:"+1.2pp YoY", d:"up"},
        {l:"R&D Spend",         v:"$890M",   c:"+9.4% YoY",  d:"up"},
        {l:"Patent Portfolio",  v:"4,200",   c:"+380 filed", d:"up"},
        {l:"Net Debt / EBITDA", v:"2.1x",    c:"-0.3x YoY",  d:"up"}
    ],

    /* === SIDEBAR MODEL === */
    model: [
        {
            id: "overview",
            label: "Overview",
            icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',
            children: [
                { id: "ov", label: "Identity & Thesis", type: "overview" },
                { id: "km", label: "Key Metrics",       type: "metrics" }
            ]
        },
        {
            id: "notes",
            label: "Notes",
            icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
            children: [
                {
                    id: "int-notes",
                    label: "Intelligence Notes",
                    type: "markdown",
                    content: `# Intelligence Notes — Acme Corporation

## Key Assessment (2024)

**Overall Rating: MODERATE CONFIDENCE**

Acme Corporation presents as a classic diversified industrial holding — resilient but not particularly agile. The portfolio is well-balanced between legacy cash generators (AMS, AAM) and growth engines (ADI, AES), but the central challenge remains: can Thomas Burke's team extract enough cross-subsidiary synergy to justify the holding company discount the market applies?

## Strategic Observations

1. **ADI is the crown jewel.** The hyperscaler partnerships are deeply embedded — switching costs are enormous once a rack design is qualified into a data center build-out. Expect ADI to exceed $5B revenue by 2027 if cloud capex growth continues at 15%+ CAGR.

2. **AES hydrogen bet is high-risk.** $400M committed to electrolyzer development in a market where Chinese competitors are 2-3 years ahead on cost curve. The DOE grants help, but this looks like a strategic option, not a near-term revenue driver.

3. **ASS government backlog is a mixed signal.** $1.2B backlog sounds impressive, but federal contract profitability is thin (8-10% margins vs 20%+ in commercial). Risk of margin compression if sequestration returns.

## Relationship Map — Gaps

- **No visible presence in Japan or South Korea** despite both being critical markets for advanced materials and semiconductor equipment.
- **Academic partnerships are thin.** Only one named university relationship for a $14B company is notably light.
- **No joint ventures with defense primes.** AAM sells *to* defense programs but has no structured JVs with Lockheed, RTX, or Northrop Grumman.

## Watch Items

| Item | Trigger | Timeframe |
|------|---------|-----------|
| ADI secondary offering | Revenue >$4B | 12-18 months |
| AES hydrogen pilot results | Pilot completion | Q2 2025 |
| AMS market share erosion | Asian CNC competitors | Ongoing |
| ASS contract win/loss ratio | Quarterly review | Ongoing |
| Acme Europe profitability | EBIT margin >10% | 2025 |

## Open Questions

> What is the actual synergy capture rate? Management claims $200M in annual cross-subsidiary revenue, but this has never been independently verified.

> Is Burke positioning Acme for a breakup? The increasing transparency around subsidiary-level financials could signal preparation for a spin-off of AES or ADI.

> How exposed is AAM to rare earth supply chain disruption? The specialty alloy business depends on imported rare earth elements with limited secondary sourcing.

---

*Last updated: 2024-12-15 | Analyst: [Redacted] | Classification: Internal Use Only*`
                }
            ]
        }
    ]
};

/* ===== STATE ===== */
let cur = "ov";

/* Flat lookup: id → child node + parent group */
function flatMap() {
    const m = {};
    D.model.forEach(g => g.children.forEach(ch => { m[ch.id] = Object.assign({}, ch, { _group: g }); }));
    return m;
}

/* ===== INIT ===== */
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("hdr-name").textContent = D.identity.short;
    document.getElementById("hdr-fsel").textContent  = D.identity.name;
    document.getElementById("hdr-fid").textContent    = D.identity.id;
    document.title = D.identity.name + " — Holding Intelligence";
    buildNav();
    go("ov", "Identity & Thesis");
});

/* ===== NAV — driven entirely from D.model ===== */
function buildNav() {
    const firstId = D.model[0].children[0].id;
    document.getElementById("nav").innerHTML = D.model.map(g =>
        `<div class="td ${g.children.some(c => c.id === firstId) ? "ex" : ""}" data-d="${g.id}">
            <button class="dh" onclick="tog('${g.id}')">
                <span class="di">${g.icon}</span>
                <span class="dl">${g.label}</span>
                <span class="db">${g.children.length}</span>
                <svg class="ei" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <ul class="dc">${g.children.map(c =>
                `<li class="nl ${c.id === cur ? "on" : ""}" data-v="${c.id}" onclick="go('${c.id}','${c.label}')">${c.label}</li>`
            ).join("")}</ul>
        </div>`
    ).join("");
}

function tog(id) { document.querySelector(`[data-d="${id}"]`).classList.toggle("ex"); }

function go(id, label) {
    cur = id;
    const fm = flatMap();
    const node = fm[id];
    if (!node) return;
    document.querySelectorAll(".nl").forEach(n => n.classList.toggle("on", n.dataset.v === id));
    document.getElementById("ba").textContent = label;
    document.querySelectorAll(".td").forEach(d => d.classList.remove("ex"));
    document.querySelector(`[data-d="${node._group.id}"]`).classList.add("ex");
    document.getElementById("bp").textContent = node._group.label;
    render(id, node);
}

/* ===== RENDER — dispatches on node.type ===== */
function render(id, node) {
    const el = document.getElementById("wb");
    const views = { overview: vOverview, metrics: vMetrics, markdown: vMarkdown };
    const fn = views[node.type];
    if (fn) { el.innerHTML = fn(node); el.scrollTop = 0; requestAnimationFrame(anim); }
}

/* ===== VIEW: overview ===== */
function vOverview() {
    const id = D.identity, ov = D.overview;
    return `
    <div class="ms"><div class="hb">
        <div class="hy">${id.founded}</div>
        <div class="hs">${id.name} — ${id.hq}</div>
        <p style="color:var(--text-secondary);margin-top:16px;max-width:700px;line-height:1.7;font-size:14px">${id.tagline}</p>
        <div class="pr" style="margin-top:14px">
            <span class="p gn">${id.legal}</span>
            <span class="p ac">${id.sector}</span>
            <span class="p vi">${id.website}</span>
        </div>
    </div></div>
    <div class="ms"><div class="st">Portfolio Thesis</div>
        <div class="cs"><p style="font-size:14px;color:var(--text-secondary);line-height:1.8">${ov.thesis}</p></div>
    </div>
    <div class="ms"><div class="st">Holding Model</div>
        <div class="g2">
            <div class="c"><span class="cl">Model Type</span><div class="cv">${ov.model.type}</div><p class="cd">${ov.model.desc}</p></div>
            <div class="c"><span class="cl">Autonomy Level</span><div class="cv">${ov.model.autonomy}</div></div>
        </div>
    </div>
    <div class="ms"><div class="st">Strategic Intent</div>
        <div class="qb"><p class="qt">"${ov.intent}"</p></div>
    </div>`;
}

/* ===== VIEW: metrics ===== */
function vMetrics() {
    return `<div class="ms"><div class="st">Key Performance Metrics</div>
        <div class="mg">${D.metrics.map(m => `
            <div class="mc">
                <div class="ml">${m.l}</div>
                <div class="mv">${m.v}</div>
                <div class="mch ${m.d}">${m.d === "up" ? "↑" : m.d === "dn" ? "↓" : "—"} ${m.c}</div>
            </div>`).join("")}
        </div>
    </div>`;
}

/* ===== VIEW: markdown — renders content directly from the model node ===== */
function vMarkdown(node) {
    const text = node.content || "";
    return `<div class="ms"><div class="st">${node.label}</div>
        <div class="md-note">${renderMd(text)}</div>
    </div>`;
}

/* ===== MARKDOWN RENDERER ===== */
function renderMd(text) {
    if (typeof marked !== "undefined") {
        marked.setOptions({ breaks: true, gfm: true });
        return marked.parse(text);
    }
    return `<pre style="white-space:pre-wrap;font-size:13px;color:var(--text-secondary)">${text}</pre>`;
}

/* ===== UTILS ===== */
function anim() {
    document.querySelectorAll(".c,.mc,.hb,.qb,.cs,.md-note").forEach((e, i) => {
        e.style.opacity = "0"; e.style.transform = "translateY(16px)";
        setTimeout(() => { e.style.transition = "opacity .35s ease,transform .35s ease"; e.style.opacity = "1"; e.style.transform = "translateY(0)"; }, i * 35);
    });
}

function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.style.transform = "translateY(0)"; t.style.opacity = "1";
    setTimeout(() => { t.style.transform = "translateY(80px)"; t.style.opacity = "0"; }, 2400);
}
</script>
</body>
</html>
