<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planetary Actors · Index Typorum</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: 'var(--bg)',
            fg: 'var(--fg)',
            muted: 'var(--muted)',
            accent: 'var(--accent)',
            accentDark: 'var(--accent-dark)',
            card: 'var(--card)',
            border: 'var(--border)',
            navy: '#1B2838',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg: #FAFBFC;
      --fg: #1E293B;
      --muted: #64748B;
      --accent: #4A6FA5;
      --accent-dark: #3A5A8A;
      --accent-glow: rgba(74, 111, 165, 0.15);
      --card: #FFFFFF;
      --border: #E2E8F0;
      --border-hover: #CBD5E1;
      --input-bg: #FFFFFF;
      --skeleton-from: #f1f5f9;
      --skeleton-to: #e2e8f0;
      --footer-bg: #0B1A2B;
      --footer-text: #B8C5D4;
      --footer-text-light: #E8EDF3;
      --footer-muted: #5A7089;
      --status-active: #22c55e;
      --dropdown-shadow: rgba(0, 0, 0, 0.12);
      --card-shadow: rgba(0, 0, 0, 0.06);
      --tag-bg: rgba(30, 41, 59, 0.06);
      --tag-selected-border: #1E293B;
    }

    .dark {
      --bg: #0D1926;
      --fg: #E8EDF3;
      --muted: #8BA3BC;
      --accent: #6B9BD1;
      --accent-dark: #4A7AB0;
      --accent-glow: rgba(107, 155, 209, 0.2);
      --card: #152238;
      --border: #243B55;
      --border-hover: #3A5470;
      --input-bg: #0F1D2D;
      --skeleton-from: #1a2d45;
      --skeleton-to: #243B55;
      --dropdown-shadow: rgba(0, 0, 0, 0.4);
      --card-shadow: rgba(0, 0, 0, 0.3);
      --tag-bg: rgba(107, 155, 209, 0.12);
      --tag-selected-border: #6B9BD1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      transition: background-color 200ms ease-out, color 200ms ease-out;
    }

    .main-content { flex: 1 0 auto; }
    .site-footer { flex-shrink: 0; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-entrance { opacity: 0; animation: fadeInUp 250ms ease-out forwards; }
    .delay-1 { animation-delay: 0ms; }
    .delay-2 { animation-delay: 80ms; }
    .delay-3 { animation-delay: 150ms; }
    .delay-4 { animation-delay: 250ms; }
    .delay-5 { animation-delay: 350ms; }

    @media (prefers-reduced-motion: reduce) {
      .animate-entrance { animation: none; opacity: 1; }
    }

    /* Theme Toggle */
    .theme-toggle {
      position: fixed; top: 1.5rem; right: 1.5rem; width: 44px; height: 44px;
      border-radius: 10px; border: 1px solid var(--border); background: var(--card);
      color: var(--muted); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 150ms ease-out; z-index: 100;
      box-shadow: 0 2px 8px var(--card-shadow);
    }
    .theme-toggle:hover { border-color: var(--border-hover); color: var(--fg); transform: translateY(-1px); box-shadow: 0 4px 12px var(--card-shadow); }
    .theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .theme-toggle:active { transform: translateY(0); }
    .theme-toggle .icon-sun, .theme-toggle .icon-moon { position: absolute; transition: opacity 200ms ease-out, transform 200ms ease-out; }
    .theme-toggle .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }
    .theme-toggle .icon-sun { opacity: 0; transform: rotate(-90deg) scale(0.5); }
    .dark .theme-toggle .icon-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }
    .dark .theme-toggle .icon-sun { opacity: 1; transform: rotate(0deg) scale(1); }

    /* Search Module */
    .search-module { position: relative; }
    .search-input { transition: border-color 150ms ease-out, box-shadow 150ms ease-out, background-color 200ms ease-out; background-color: var(--input-bg); }
    .search-input:hover { border-color: var(--border-hover); box-shadow: 0 2px 8px var(--card-shadow); }
    .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    /* Tag Row */
    .tag-row-wrapper { position: relative; width: 100%; margin-top: 12px; }
    .tag-row { display: flex; align-items: center; gap: 6px; }
    .tag-scroll-container { flex: 1; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; scroll-behavior: smooth; }
    .tag-scroll-container::-webkit-scrollbar { display: none; }
    .tag-container { display: flex; flex-wrap: nowrap; gap: 8px; padding: 2px 0; }
    
    .tag-pill {
      display: inline-flex; align-items: center; padding: 5px 12px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 400;
      letter-spacing: 0.04em; text-transform: none; color: var(--muted);
      background: transparent; border: 1px solid var(--border); border-radius: 4px;
      white-space: nowrap; cursor: pointer; transition: all 100ms ease-out; flex-shrink: 0;
    }
    .tag-pill:hover:not(.selected) { color: var(--fg); border-color: var(--border-hover); background: var(--tag-bg); }
    .tag-pill.selected { color: var(--fg); background: var(--tag-bg); border-color: var(--tag-selected-border); font-weight: 500; }
    .tag-pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Dropdown Panel */
    .search-dropdown {
      position: relative; margin-top: 8px; background: var(--card);
      border: 1px solid var(--border); border-radius: 8px;
      box-shadow: 0 12px 32px var(--dropdown-shadow);
      display: none; opacity: 0; transform: translateY(-8px);
      transition: opacity 150ms ease-out, transform 150ms ease-out;
      overflow: hidden; max-height: 420px;
    }
    .search-dropdown.open { display: block; opacity: 1; transform: translateY(0); }
    .dropdown-results { max-height: 300px; overflow-y: auto; overscroll-behavior: contain; }
    .search-dropdown-item { padding: 12px 16px; cursor: pointer; transition: background-color 100ms ease-out; border-bottom: 1px solid var(--border); }
    .search-dropdown-item:last-child { border-bottom: none; }
    .search-dropdown-item:hover, .search-dropdown-item.active { background-color: var(--tag-bg); }

    /* Card Styling */
    .entity-card {
      transition: transform 150ms ease-out, box-shadow 150ms ease-out, background-color 200ms ease-out;
      background-color: var(--card); border-color: var(--border);
    }
    .entity-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
      background-color: var(--accent); opacity: 0; transition: opacity 150ms ease-out;
      border-radius: 1px 0 0 1px;
    }
    .entity-card:hover::before { opacity: 1; }
    .entity-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px -8px var(--dropdown-shadow); }
    .entity-card:hover .card-title { color: var(--accent); }
    .card-tag { background: var(--tag-bg); color: var(--muted); }

    /* Buttons & Pagination */
    .btn-outline { transition: background-color 150ms ease-out, border-color 150ms ease-out; background-color: transparent; }
    .btn-outline:hover { background-color: var(--tag-bg); border-color: var(--accent); }
    .btn-outline:hover .btn-arrow { transform: translateX(3px); }
    .btn-arrow { transition: transform 150ms ease-out; }
    .view-cta { transition: color 150ms ease-out; color: var(--accent); }
    .view-cta:hover { color: var(--accent-dark); }
    .view-cta:hover .view-arrow { transform: translateX(3px); }
    .view-arrow { transition: transform 150ms ease-out; }
    .page-dot { transition: background-color 120ms ease-out; }
    .pagination-btn { transition: color 120ms ease-out; }
    .pagination-btn:hover:not(:disabled) { color: var(--fg); }
    .pagination-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Focus & Accessibility */
    button:focus-visible, a:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    
    /* Loading Skeleton */
    .loading-skeleton { background: linear-gradient(90deg, var(--skeleton-from) 25%, var(--skeleton-to) 50%, var(--skeleton-from) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>
  
  <!-- Theme Toggle -->
  <button class="theme-toggle animate-entrance" id="themeToggle" aria-label="Toggle dark mode" type="button">
    <svg class="icon-moon w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/>
    </svg>
    <svg class="icon-sun w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0a3.75 3.75 0 017.5 0z"/>
    </svg>
  </button>

  <div class="main-content">
    <!-- Hero Layer -->
    <header class="pt-12 pb-16 px-6">
      <div class="max-w-6xl mx-auto text-center">
        <div class="animate-entrance delay-1 mb-6">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full border border-border bg-card shadow-sm">
             <svg class="w-8 h-8 text-accent opacity-80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
              </svg>
          </div>
        </div>
        <p class="animate-entrance delay-1 font-mono text-xs tracking-[0.2em] text-muted uppercase mb-6">EST. MMXXIV</p>
        <h1 class="animate-entrance delay-2 font-display text-4xl font-medium tracking-tight text-fg mb-4">
          ACTOR TYPE INDEX
        </h1>
        <p class="animate-entrance delay-3 font-display text-xl md:text-2xl italic text-muted mb-6">
          Planetary Actors
        </p>
        <p class="animate-entrance delay-3 max-w-xl mx-auto text-muted leading-relaxed">
          A structured taxonomy of entity classifications operating within the geopolitical sphere.
        </p>
      </div>
    </header>

    <!-- Inquiry Layer -->
    <section class="pb-8 px-6">
      <div class="max-w-3xl mx-auto animate-entrance delay-4">
        <label for="searchInput" class="block font-mono text-xs tracking-[0.15em] text-muted uppercase mb-4 text-center">
          Filter Typology
        </label>

        <div class="search-module" id="searchModule">
          <div class="flex flex-col sm:flex-row gap-3">
            <div class="relative flex-1">
              <input
                type="text" 
                id="searchInput"
                class="search-input w-full h-14 px-5 pr-12 text-base bg-card border border-border rounded-lg shadow-sm"
                placeholder="Search actor classifications..."
                autocomplete="off"
                aria-label="Search types"
              >
              <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-muted pointer-events-none" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
              </svg>
            </div>
          </div>

          <!-- Tag Row -->
          <div class="tag-row-wrapper">
            <div class="tag-row">
              <div class="tag-scroll-container">
                <div class="tag-container" id="tagContainer">
                  <button class="tag-pill selected" data-filter="all">All Categories</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Search Dropdown -->
          <div id="searchDropdown" class="search-dropdown">
            <div class="dropdown-results" id="dropdownResults"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Entity Registry Grid -->
    <section class="pb-16 px-6">
      <div class="max-w-6xl mx-auto">
        <div id="loadingSkeleton" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="bg-card border border-border rounded-xl p-6"><div class="loading-skeleton h-6 w-24 rounded mb-4"></div><div class="loading-skeleton h-4 w-full rounded mb-2"></div><div class="loading-skeleton h-4 w-3/4 rounded"></div></div>
          <div class="bg-card border border-border rounded-xl p-6 hidden md:block"><div class="loading-skeleton h-6 w-24 rounded mb-4"></div><div class="loading-skeleton h-4 w-full rounded mb-2"></div><div class="loading-skeleton h-4 w-3/4 rounded"></div></div>
        </div>

        <div id="entityGrid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6" role="list"></div>
        <div id="emptyState" class="hidden py-20 text-center"><p class="text-muted">No matching types found.</p></div>
      </div>
    </section>

    <!-- Pagination Layer -->
    <section id="paginationSection" class="hidden pb-20 px-6">
      <div class="max-w-6xl mx-auto flex items-center justify-center gap-6">
        <button id="prevBtn" class="pagination-btn flex items-center gap-2 text-sm text-muted disabled:opacity-40" disabled>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Prev</span>
        </button>
        <div id="pageIndicator" class="flex items-center gap-2" role="tablist"></div>
        <button id="nextBtn" class="pagination-btn flex items-center gap-2 text-sm text-muted">
          <span>Next</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </section>
  </div>

  <!-- Footer -->
  <footer class="site-footer py-12 px-6" style="background-color: #0B1A2B;">
    <div class="max-w-6xl mx-auto text-center">
      <p class="font-display text-lg font-medium tracking-[0.25em] uppercase mb-2" style="color: #E8EDF3;">PLANETARY ACTORS</p>
      <p class="font-mono text-[10px] tracking-[0.15em] uppercase" style="color: #4A6075;">INDEX TYPOLOGY v1.0</p>
    </div>
  </footer>

  <script>
    // =============================================
    // DATA SOURCE (JSON Structure)
    // =============================================
    const DATA = {
      actorTypes: [
        { id: 1, name: "Sovereign State", category: "Political", desc: "A political entity with a permanent population, defined territory, and government.", icon: "🏛️" },
        { id: 2, name: "Intergovernmental Org", category: "Institutional", desc: "Organization composed primarily of sovereign states, established by treaty.", icon: "🤝" },
        { id: 3, name: "Multinational Corporation", category: "Economic", desc: "Corporate entity operating in multiple countries, often with significant influence.", icon: "🏢" },
        { id: 4, name: "Non-Governmental Org", category: "Civil Society", desc: "Non-profit entities operating independently of government influence.", icon: "⚖️" },
        { id: 5, name: "Insurgent Group", category: "Militant", desc: "Non-state armed group engaged in irregular warfare against established authority.", icon: "🔥" },
        { id: 6, name: "Terrorist Network", category: "Militant", desc: "Decentralized groups employing asymmetric violence for ideological aims.", icon: "⚠️" },
        { id: 7, name: "Supranational Union", category: "Institutional", desc: "An organization where member states transfer significant authority.", icon: "🇪🇺" },
        { id: 8, name: "Autonomous Region", category: "Political", desc: "A subdivision of a state with limited self-governance.", icon: "🗺️" },
        { id: 9, name: "Financial Institution", category: "Economic", desc: "Banks and funds influencing global capital flows and economic stability.", icon: "💹" },
        { id: 10, name: "Religious Entity", category: "Civil Society", desc: "Organizations based on spiritual beliefs influencing social structures.", icon: "☸️" },
        { id: 11, name: "Advocacy Network", category: "Civil Society", desc: "Transnational networks advocating for specific policy or social changes.", icon: "📢" },
        { id: 12, name: "Private Military Co.", category: "Militant", desc: "Private companies providing armed combat or security services.", icon: "🛡️" },
        { id: 13, name: "Criminal Syndicate", category: "Economic", desc: "Transnational organized crime groups operating illicit markets.", icon: "🎱" },
        { id: 14, name: "Indigenous Governance", category: "Political", desc: "Self-governing bodies representing indigenous populations.", icon: "🌳" },
        { id: 15, name: "Special Admin Region", category: "Political", desc: "Territories with distinct legal and economic systems from the mainland.", icon: "🏙️" }
      ]
    };

    // =============================================
    // STATE & DOM INIT
    // =============================================
    let entities = DATA.actorTypes;
    let currentFilter = 'all';
    let currentPage = 1;
    const itemsPerPage = 4; // As requested: 4 examples max
    let filteredEntities = [...entities];

    const searchInput = document.getElementById('searchInput');
    const searchDropdown = document.getElementById('searchDropdown');
    const dropdownResults = document.getElementById('dropdownResults');
    const entityGrid = document.getElementById('entityGrid');
    const loadingSkeleton = document.getElementById('loadingSkeleton');
    const emptyState = document.getElementById('emptyState');
    const paginationSection = document.getElementById('paginationSection');
    const pageIndicator = document.getElementById('pageIndicator');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const tagContainer = document.getElementById('tagContainer');

    // =============================================
    // THEME MANAGEMENT
    // =============================================
    const themeToggle = document.getElementById('themeToggle');
    
    function initTheme() {
      if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    }
    
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });
    
    initTheme();

    // =============================================
    // TAG RENDERING
    // =============================================
    function renderTags() {
      const categories = [...new Set(entities.map(e => e.category))];
      tagContainer.innerHTML = '<button class="tag-pill selected" data-filter="all">All Categories</button>';
      
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'tag-pill';
        btn.dataset.filter = cat;
        btn.textContent = cat;
        tagContainer.appendChild(btn);
      });

      attachTagListeners();
    }

    function attachTagListeners() {
      tagContainer.querySelectorAll('.tag-pill').forEach(tag => {
        tag.addEventListener('click', () => {
          tagContainer.querySelectorAll('.tag-pill').forEach(t => t.classList.remove('selected'));
          tag.classList.add('selected');
          currentFilter = tag.dataset.filter;
          currentPage = 1; // Reset page on filter
          filterEntities();
          closeDropdown();
        });
      });
    }

    // =============================================
    // DROPDOWN & SEARCH
    // =============================================
    function openDropdown() { searchDropdown.classList.add('open'); }
    function closeDropdown() { searchDropdown.classList.remove('open'); }

    function renderDropdown(term) {
      if (term.length < 2) { closeDropdown(); return; }
      
      const matches = entities.filter(e => 
        e.name.toLowerCase().includes(term) || 
        e.category.toLowerCase().includes(term)
      );

      if (matches.length === 0) {
        dropdownResults.innerHTML = '<div class="p-4 text-sm text-muted">No results</div>';
      } else {
        dropdownResults.innerHTML = matches.map(e => `
          <div class="search-dropdown-item" data-id="${e.id}">
            <span class="font-medium">${e.name}</span>
            <span class="text-xs text-muted ml-2">${e.category}</span>
          </div>
        `).join('');
      }
      
      dropdownResults.querySelectorAll('.search-dropdown-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = item.dataset.id;
          const entity = entities.find(e => e.id == id);
          if (entity) {
            searchInput.value = entity.name;
            filterEntities();
            closeDropdown();
          }
        });
      });

      openDropdown();
    }

    searchInput.addEventListener('input', (e) => {
      renderDropdown(e.target.value.toLowerCase());
      filterEntities();
    });

    searchInput.addEventListener('focus', () => {
      if(searchInput.value.length >= 2) openDropdown();
    });

    document.addEventListener('click', (e) => {
      if (!document.getElementById('searchModule').contains(e.target)) closeDropdown();
    });

    // =============================================
    // GRID RENDERING
    // =============================================
    function renderCard(entity) {
      return `
        <article class="entity-card relative border rounded-xl p-6 shadow-sm" role="listitem">
          <div class="flex items-start justify-between mb-4">
            <div class="flex items-center gap-3">
              <span class="text-2xl">${entity.icon}</span>
              <span class="card-tag inline-block px-2 py-0.5 text-xs font-mono tracking-wide rounded">${entity.category}</span>
            </div>
          </div>
          <h3 class="card-title font-display text-xl font-medium text-fg mb-2 transition-colors duration-150">${entity.name}</h3>
          <p class="text-sm text-muted leading-relaxed mb-4">${entity.desc}</p>
          <div class="flex items-center justify-end pt-4 border-t border-border">
             <span class="font-mono text-xs text-muted/60">ID: ${entity.id.toString().padStart(3, '0')}</span>
          </div>
        </article>
      `;
    }

    function renderGrid() {
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = filteredEntities.slice(start, end);

      if (filteredEntities.length === 0) {
        entityGrid.classList.add('hidden');
        emptyState.classList.remove('hidden');
        paginationSection.classList.add('hidden');
      } else {
        emptyState.classList.add('hidden');
        entityGrid.classList.remove('hidden');
        entityGrid.innerHTML = pageItems.map(renderCard).join('');
        
        if (filteredEntities.length > itemsPerPage) {
          paginationSection.classList.remove('hidden');
          renderPagination();
        } else {
          paginationSection.classList.add('hidden');
        }
      }
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredEntities.length / itemsPerPage);
      let dots = '';
      for(let i=1; i<=totalPages; i++) {
        dots += `<button class="page-dot ${i === currentPage ? 'w-6 h-2' : 'w-2 h-2 bg-border'} rounded-full" style="${i === currentPage ? 'background-color: var(--accent);' : ''}" data-page="${i}"></button>`;
      }
      pageIndicator.innerHTML = dots;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
    }

    function filterEntities() {
      const term = searchInput.value.toLowerCase();
      filteredEntities = entities.filter(e => {
        const matchFilter = currentFilter === 'all' || e.category === currentFilter;
        const matchSearch = e.name.toLowerCase().includes(term) || e.desc.toLowerCase().includes(term) || e.category.toLowerCase().includes(term);
        return matchFilter && matchSearch;
      });
      renderGrid();
    }

    // =============================================
    // PAGINATION EVENTS
    // =============================================
    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) { currentPage--; renderGrid(); }
    });

    nextBtn.addEventListener('click', () => {
      const totalPages = Math.ceil(filteredEntities.length / itemsPerPage);
      if (currentPage < totalPages) { currentPage++; renderGrid(); }
    });

    pageIndicator.addEventListener('click', (e) => {
      if (e.target.dataset.page) {
        currentPage = parseInt(e.target.dataset.page);
        renderGrid();
      }
    });

    // =============================================
    // INITIALIZE
    // =============================================
    setTimeout(() => {
      loadingSkeleton.classList.add('hidden');
      entityGrid.classList.remove('hidden');
      renderTags();
      filterEntities();
    }, 500); // Simulate loading
  </script>
</body>
</html>
